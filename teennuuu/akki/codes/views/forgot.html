<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - Feed Connect</title>
<link rel="stylesheet" href="/css/login.css">
</head>

<body>

<div class="login-container">
<h2>Reset Password</h2>
<p style="text-align:center; color:#64748b; font-size:14px; margin-bottom:20px;">Enter your registered Email or Mobile number to reset your password.</p>

<form id="forgotForm">

<div class="form-group">
<label>Registered Email or Mobile</label>
<input type="text" id="identifier" placeholder="Enter email or 10-digit mobile" required>
</div>

<div class="form-group">
<label>New Password</label>
<input type="password" id="newPassword" placeholder="Create a new password" required>
</div>

<button type="submit" style="background:#10b981; color:white;">Update Password</button><br><br>

<button type="button" style="background:#e2e8f0; color:#475569;" onclick="window.location.href='login.html'">⬅ Back to Login</button>

</form>

</div>

<script>
document.getElementById("forgotForm").addEventListener("submit", function(e){
  e.preventDefault();

  let identifier = document.getElementById("identifier").value.trim();
  let newPassword = document.getElementById("newPassword").value.trim();

  fetch('/api/forgot', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ identifier, newPassword })
  })
  .then(response => response.json().then(data => ({ status: response.status, body: data })))
  .then(result => {
    if (result.status === 200) {
      alert("Success: " + result.body.message);
      window.location.href = "login.html";
    } else {
      alert("Error: " + (result.body.message || "Failed to locate user."));
    }
  })
  .catch(err => {
    console.error("Error:", err);
    alert("A network error occurred. Is the server running?");
  });
});
</script>

</body>
</html>
